workflows:
  ios-appstore:
    name: Quantum Queen iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MemoryRxAi-ASC
    environment:
      ios_signing:
        certificates:
          - QuantumQueen-Distribution-Cert
      vars:
        XCODE_WORKSPACE: "src/Quantum Queen.xcworkspace"
        XCODE_SCHEME: "Quantum Queen"
        APP_STORE_APPLE_ID: "6768386321"
        BUNDLE_ID: "org.heuremen.quantumqueen"
    scripts:
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Set build number
        script: |
          cd src
          agvtool new-version -all $BUILD_NUMBER
      - name: Fetch signing files via ASC API
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
      - name: Initialize keychain and add certs
        script: |
          keychain initialize
          keychain add-certificates
      - name: Apply provisioning profiles to Xcode project
        script: |
          xcode-project use-profiles
      - name: Generate export options plist
        script: |
          cat > /tmp/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>VWS5F2ULF3</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build iOS for App Store
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath /tmp/QuantumQueen.xcarchive \
            archive
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/QuantumQueen.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
