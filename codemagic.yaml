workflows:
  ios-appstore:
    name: Quantum Queen iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: MemoryRxAi-ASC
    environment:
      ios_signing:
        provisioning_profiles:
          - QuantumQueen-AppStore-Profile
        certificates:
          - QuantumQueen-Distribution-Cert
      vars:
        XCODE_WORKSPACE: "src/Quantum Queen.xcworkspace"
        XCODE_SCHEME: "Quantum Queen"
        APP_STORE_APPLE_ID: "6768386321"
    scripts:
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Set build number
        script: |
          cd src
          agvtool new-version -all $BUILD_NUMBER
      - name: Generate export options plist
        script: |
          cat > /tmp/export_options.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>VWS5F2ULF3</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>org.heuremen.quantumqueen</key>
              <string>QuantumQueen AppStore</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF
      - name: Build iOS for App Store
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath /tmp/QuantumQueen.xcarchive \
            archive \
            DEVELOPMENT_TEAM=VWS5F2ULF3 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="QuantumQueen AppStore"
          mkdir -p build/ios/ipa
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/QuantumQueen.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
